name: bersn-backend

services:
  postgres:
    image: postgres:16-alpine
    container_name: bersn_backend_pg
    environment:
      POSTGRES_DB: bersn_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - bersn_backend_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bersn_auth"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: bersn_backend_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bersn_backend_api
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: development
      API_TRUST_PROXY: 0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bersn_auth
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      AUTH_JWT_ISSUER: bersn-backend
      AUTH_JWT_AUDIENCE: bersn-frontend
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAME_SITE: lax
      AUTH_WEBAUTHN_RP_ID: "localhost"
      AUTH_WEBAUTHN_ORIGINS: "http://localhost:3002,http://localhost:3000,http://localhost:5173,http://localhost:5174"
      AUTH_BOOTSTRAP_ADMIN_USERNAME: "admin"
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: "Taoyuan@2026Platform!"
      AUTH_BOOTSTRAP_ADMIN_ROLE: "SYS_ADMIN"
      AUTH_BOOTSTRAP_ADMIN_FORCE: "true"
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM:-BERSn Local <no-reply@localhost>}
      AUTH_EMAIL_LOG_ONLY: ${AUTH_EMAIL_LOG_ONLY:-true}
      AUTH_SMTP_HOST: ${AUTH_SMTP_HOST:-}
      AUTH_SMTP_PORT: ${AUTH_SMTP_PORT:-587}
      AUTH_SMTP_SECURE: ${AUTH_SMTP_SECURE:-false}
      AUTH_SMTP_USER: ${AUTH_SMTP_USER:-}
      AUTH_SMTP_PASSWORD: ${AUTH_SMTP_PASSWORD:-}
      AUTH_PASSWORD_MIN_LENGTH: 12
      AUTH_ACCESS_TTL_SECONDS: 1800
      AUTH_REFRESH_TTL_SECONDS: 604800
      AUTH_REMEMBER_ME_REFRESH_TTL_SECONDS: 2592000
      AUTH_LOGIN_RATE_LIMIT_MAX: 10
      AUTH_LOGIN_RATE_LIMIT_WINDOW_SECONDS: 900
      AUTH_LOCKOUT_MAX_FAILURES: 5
      AUTH_LOCKOUT_WINDOW_SECONDS: 900
      AUTH_LOCKOUT_DURATION_SECONDS: 900
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  bersn_backend_pgdata:
    name: backend_bersn_backend_pgdata
    external: true
